name: CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

      - name: Run JS/TS runtime tests
        run: make test-js

  cd:
    name: Release
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release artifacts
        run: |
          mkdir -p dist
          cp target/release/deno-edge-runtime dist/deno-edge-runtime-linux-amd64
          chmod +x dist/deno-edge-runtime-linux-amd64
          tar -czf dist/deno-edge-runtime-linux-amd64.tar.gz -C dist deno-edge-runtime-linux-amd64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: deno-edge-runtime-${{ github.ref_name }}
          path: dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/deno-edge-runtime-linux-amd64
            dist/deno-edge-runtime-linux-amd64.tar.gz
          generate_release_notes: true
