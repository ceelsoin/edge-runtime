global:
  scrape_interval: 5s
  scrape_timeout: 5s

scrape_configs:
  - job_name: otel-collector-exported-metrics
    static_configs:
      - targets: ["otel-collector:9464"]

  - job_name: otel-collector-self-metrics
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: vmagent
    static_configs:
      - targets: ["127.0.0.1:8429"]
