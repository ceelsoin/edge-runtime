global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: otel-collector-exported-metrics
    static_configs:
      - targets: ["otel-collector:9464"]

  - job_name: otel-collector-self-metrics
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
