services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: edge-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
      - "8888:8888"
    depends_on:
      - tempo
      - loki
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.5.0
    container_name: edge-tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    container_name: edge-loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.102.1
    container_name: edge-victoriametrics
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-httpListenAddr=:8428"
      - "-selfScrapeInterval=10s"
    volumes:
      - victoriametrics-data:/victoria-metrics-data
    ports:
      - "8428:8428"
    restart: unless-stopped

  vmagent:
    image: victoriametrics/vmagent:v1.102.1
    container_name: edge-vmagent
    command:
      - "-promscrape.config=/etc/vmagent/prometheus.yml"
      - "-remoteWrite.url=http://victoriametrics:8428/insert/0/prometheus/api/v1/write"
    volumes:
      - ./vmagent/prometheus.yml:/etc/vmagent/prometheus.yml:ro
    depends_on:
      - otel-collector
      - victoriametrics
    ports:
      - "8429:8429"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: edge-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: edge-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - victoriametrics
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

volumes:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:
  victoriametrics-data:
